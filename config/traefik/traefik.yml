# Traefik Static Configuration
# Gilt fuer VPS und Raspberry Pi gleichermassen.
# Auf dem VPS: Edge-Proxy mit TLS
# Auf dem Pi: Lokaler Reverse-Proxy fuer interne Dienste

global:
  checkNewVersion: false
  sendAnonymousUsage: false

# API & Dashboard (nur intern erreichbar!)
api:
  dashboard: true
  insecure: false

# Logging
log:
  level: INFO
  filePath: /var/log/traefik/traefik.log

accessLog:
  filePath: /var/log/traefik/access.log
  bufferingSize: 100

# Entrypoints
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt

# TLS / Let's Encrypt
certificatesResolvers:
  letsencrypt:
    acme:
      email: DEINE_EMAIL@beispiel.de
      storage: /etc/traefik/acme/acme.json
      httpChallenge:
        entryPoint: web

# Provider: Dynamische Konfiguration aus Dateien laden
providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: proxy

# Metriken (optional)
# metrics:
#   prometheus: {}
